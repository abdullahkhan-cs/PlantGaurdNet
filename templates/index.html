<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlantGuardNet | AI Diagnosis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="text-white min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full glass-card p-8 rounded-[2.5rem]">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-black gradient-text tracking-tight mb-2">PLANTGUARD AI</h1>
            <p class="text-gray-400 text-sm">Deep Learning Powered Disease Detection</p>
        </header>

        <form action="/" method="post" enctype="multipart/form-data">
            <!-- Camera Preview Area -->
            <div id="cameraSection" class="hidden mb-4">
                <video id="cameraFeed" autoplay playsinline class="w-full rounded-2xl object-cover max-h-64 bg-gray-900"></video>
                <canvas id="cameraCanvas" class="hidden"></canvas>
                <input type="hidden" name="captured_image" id="capturedImageData">
            </div>

            <!-- Upload Area -->
            <div class="upload-area border-2 border-dashed border-gray-700 rounded-3xl p-8 text-center transition-all cursor-pointer mb-4" id="upload-label">
                <input type="file" name="file" class="hidden" id="fileInput" accept="image/*" capture="environment">
                <label for="fileInput" class="cursor-pointer">
                    <div class="bg-gray-800 w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4">
                        <svg class="w-7 h-7 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M12 4v16m8-8H4" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <p class="text-lg font-medium">Upload Leaf Image</p>
                    <p class="text-gray-500 text-xs mt-1">PNG, JPG or JPEG (Max 10MB)</p>
                </label>
            </div>

            <!-- Camera Button -->
            <button type="button" id="cameraBtn" class="w-full bg-gray-700 hover:bg-gray-600 text-white font-semibold py-3 rounded-2xl transition-all mb-4 flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
                <span id="cameraBtnText">Open Camera</span>
            </button>

            <!-- Capture Button (hidden initially) -->
            <button type="button" id="captureBtn" class="hidden w-full bg-red-500 hover:bg-red-400 text-white font-semibold py-3 rounded-2xl transition-all mb-4 flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                </svg>
                Capture Photo
            </button>

            <button type="submit" class="w-full bg-green-500 hover:bg-green-400 text-black font-bold py-4 rounded-2xl transition-all transform hover:scale-[1.02] active:scale-95 shadow-[0_0_20px_rgba(16,185,129,0.3)]">
                RUN DIAGNOSTIC
            </button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    <script>
        const cameraBtn = document.getElementById('cameraBtn');
        const captureBtn = document.getElementById('captureBtn');
        const cameraSection = document.getElementById('cameraSection');
        const cameraFeed = document.getElementById('cameraFeed');
        const cameraCanvas = document.getElementById('cameraCanvas');
        const capturedImageData = document.getElementById('capturedImageData');
        const cameraBtnText = document.getElementById('cameraBtnText');
        const uploadLabel = document.getElementById('upload-label');
        
        let stream = null;

        cameraBtn.addEventListener('click', async () => {
            if (stream) {
                // Stop camera
                stream.getTracks().forEach(track => track.stop());
                stream = null;
                cameraSection.classList.add('hidden');
                captureBtn.classList.add('hidden');
                cameraBtnText.textContent = 'Open Camera';
                uploadLabel.classList.remove('hidden');
            } else {
                // Start camera
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: 'environment' } 
                    });
                    cameraFeed.srcObject = stream;
                    cameraSection.classList.remove('hidden');
                    captureBtn.classList.remove('hidden');
                    cameraBtnText.textContent = 'Close Camera';
                    uploadLabel.classList.add('hidden');
                } catch (err) {
                    alert('Camera access denied or not available');
                }
            }
        });

        captureBtn.addEventListener('click', () => {
            const context = cameraCanvas.getContext('2d');
            cameraCanvas.width = cameraFeed.videoWidth;
            cameraCanvas.height = cameraFeed.videoHeight;
            context.drawImage(cameraFeed, 0, 0);
            capturedImageData.value = cameraCanvas.toDataURL('image/jpeg', 0.8);
            
            // Show captured image preview
            const imgPreview = document.createElement('img');
            imgPreview.src = capturedImageData.value;
            imgPreview.className = 'w-full rounded-2xl object-cover max-h-64 mt-4';
            cameraSection.innerHTML = '';
            cameraSection.appendChild(cameraFeed);
            cameraSection.appendChild(imgPreview);
            cameraSection.classList.remove('hidden');
            
            // Stop camera after capture
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            captureBtn.classList.add('hidden');
            cameraBtnText.textContent = 'Retake Photo';
        });
    </script>
</body>
</html>
